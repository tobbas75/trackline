<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 650" font-family="monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Modem Daughter Card — EG800Q-EU Rev A</text>
  <text x="350" y="48" text-anchor="middle" font-size="13" fill="#666">~50 x 35 mm, 2-layer FR4, Top View</text>

  <text x="350" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#444">TOP VIEW (component side)</text>

  <!-- PCB outline -->
  <g transform="translate(125, 90)">
    <rect x="0" y="0" width="450" height="320" rx="4" ry="4" fill="#1a4a1a" stroke="#0d3d0d" stroke-width="2"/>
    <rect x="4" y="4" width="442" height="312" rx="2" ry="2" fill="none" stroke="#2a6a2a" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- M2 mounting holes -->
    <circle cx="18" cy="18" r="7" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="18" cy="18" r="3.5" fill="#1a1a1a"/>
    <circle cx="432" cy="18" r="7" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="432" cy="18" r="3.5" fill="#1a1a1a"/>
    <circle cx="18" cy="302" r="7" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="18" cy="302" r="3.5" fill="#1a1a1a"/>
    <circle cx="432" cy="302" r="7" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="432" cy="302" r="3.5" fill="#1a1a1a"/>

    <!-- === EG800Q-EU Modem Module === -->
    <rect x="30" y="40" width="200" height="160" rx="5" fill="#2a2a3a" stroke="#6666cc" stroke-width="2"/>
    <text x="130" y="90" text-anchor="middle" font-size="16" fill="#aaaaff" font-weight="bold">EG800Q-EU</text>
    <text x="130" y="110" text-anchor="middle" font-size="11" fill="#8888cc">Quectel</text>
    <text x="130" y="128" text-anchor="middle" font-size="11" fill="#8888cc">LTE CAT-1bis</text>
    <text x="130" y="148" text-anchor="middle" font-size="10" fill="#666699">Band 28 (700MHz)</text>
    <text x="130" y="165" text-anchor="middle" font-size="10" fill="#666699">Band 7 (2600MHz)</text>
    <text x="130" y="182" text-anchor="middle" font-size="9" fill="#555588">LGA package</text>

    <!-- Pin labels on modem -->
    <text x="232" y="65" text-anchor="start" font-size="8" fill="#aaa">UART_RXD (1.8V)</text>
    <text x="232" y="80" text-anchor="start" font-size="8" fill="#aaa">UART_TXD (1.8V)</text>
    <text x="232" y="95" text-anchor="start" font-size="8" fill="#aaa">PWRKEY (1.8V)</text>
    <text x="232" y="110" text-anchor="start" font-size="8" fill="#aaa">RESET_N (1.8V)</text>
    <text x="232" y="125" text-anchor="start" font-size="8" fill="#aaa">STATUS</text>
    <text x="232" y="140" text-anchor="start" font-size="8" fill="#aaa">RI</text>
    <text x="232" y="155" text-anchor="start" font-size="8" fill="#aaa">DTR</text>
    <text x="232" y="173" text-anchor="start" font-size="8" fill="#c88">VBAT (3.8V)</text>

    <!-- === BSS138 Level Shifters (4x) === -->
    <rect x="275" y="45" width="130" height="100" rx="4" fill="#3a2a2a" stroke="#ff8888" stroke-width="1.5"/>
    <text x="340" y="65" text-anchor="middle" font-size="11" fill="#ffcccc" font-weight="bold">4x BSS138</text>
    <text x="340" y="80" text-anchor="middle" font-size="10" fill="#cc8888">Level Shifters</text>
    <text x="340" y="98" text-anchor="middle" font-size="9" fill="#aa6666">1.8V modem side</text>
    <text x="340" y="112" text-anchor="middle" font-size="9" fill="#aa6666">3.3V host side</text>
    <text x="340" y="130" text-anchor="middle" font-size="8" fill="#886666">TXD, RXD, PWRKEY, RST</text>

    <!-- Arrow from modem to level shifters -->
    <line x1="230" y1="80" x2="275" y2="80" stroke="#ff8888" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- === u.FL Antenna Connector === -->
    <circle cx="65" cy="265" r="18" fill="#444" stroke="#ffcc44" stroke-width="2"/>
    <circle cx="65" cy="265" r="8" fill="#222" stroke="#ffcc44" stroke-width="1"/>
    <circle cx="65" cy="265" r="3" fill="#ffcc44"/>
    <text x="65" y="295" text-anchor="middle" font-size="10" fill="#ffcc44" font-weight="bold">u.FL</text>
    <text x="65" y="308" text-anchor="middle" font-size="8" fill="#cc9933">Antenna</text>

    <!-- PI matching network -->
    <rect x="95" y="252" width="60" height="26" rx="2" fill="#2a2a2a" stroke="#ccaa44" stroke-width="1"/>
    <text x="125" y="269" text-anchor="middle" font-size="9" fill="#ddcc88">PI Match</text>
    <line x1="83" y1="265" x2="95" y2="265" stroke="#ccaa44" stroke-width="1"/>
    <line x1="155" y1="265" x2="175" y2="210" stroke="#ccaa44" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- === Nano-SIM Holder === -->
    <rect x="175" y="215" width="110" height="70" rx="3" fill="#3a3a2a" stroke="#cccc44" stroke-width="1.5"/>
    <text x="230" y="240" text-anchor="middle" font-size="11" fill="#eeee88" font-weight="bold">Nano-SIM</text>
    <text x="230" y="255" text-anchor="middle" font-size="9" fill="#cccc66">Holder</text>
    <text x="230" y="272" text-anchor="middle" font-size="8" fill="#999966">+ MFF2 eSIM (DNP)</text>

    <!-- SIM ESD protection -->
    <rect x="295" y="230" width="55" height="22" rx="2" fill="#2a2a3a" stroke="#8888cc" stroke-width="1"/>
    <text x="322" y="245" text-anchor="middle" font-size="8" fill="#aaaadd">TPD3E001</text>
    <text x="322" y="260" text-anchor="middle" font-size="7" fill="#888">SIM ESD</text>
    <line x1="285" y1="245" x2="295" y2="245" stroke="#8888cc" stroke-width="0.5"/>

    <!-- === VBAT Decoupling === -->
    <rect x="355" y="165" width="80" height="70" rx="3" fill="#3a1a1a" stroke="#cc4444" stroke-width="1.5"/>
    <text x="395" y="185" text-anchor="middle" font-size="10" fill="#ffaaaa" font-weight="bold">VBAT</text>
    <text x="395" y="198" text-anchor="middle" font-size="10" fill="#ffaaaa">Decoup</text>
    <text x="395" y="213" text-anchor="middle" font-size="8" fill="#cc6666">100uF elec</text>
    <text x="395" y="224" text-anchor="middle" font-size="8" fill="#cc6666">10uF ceram</text>
    <text x="395" y="235" text-anchor="middle" font-size="8" fill="#cc6666">100nF</text>

    <!-- PWRKEY pull-down -->
    <rect x="355" y="250" width="80" height="30" rx="2" fill="#2a2a2a" stroke="#aaa" stroke-width="1"/>
    <text x="395" y="262" text-anchor="middle" font-size="8" fill="#ccc">10k PWRKEY</text>
    <text x="395" y="274" text-anchor="middle" font-size="8" fill="#999">pull-down</text>

    <!-- === 20-pin Host Connector === -->
    <rect x="275" y="290" width="160" height="28" rx="3" fill="#555" stroke="#fff" stroke-width="2"/>
    <text x="355" y="308" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">20-pin DF12 / 2.54mm header</text>

    <!-- Pin labels below connector -->
    <g transform="translate(278, 320)">
      <rect x="0" y="0" width="16" height="10" rx="1" fill="#c44"/><text x="8" y="8" text-anchor="middle" font-size="5" fill="#fff">VBAT</text>
      <rect x="18" y="0" width="12" height="10" rx="1" fill="#666"/><text x="24" y="8" text-anchor="middle" font-size="5" fill="#fff">G</text>
      <rect x="32" y="0" width="12" height="10" rx="1" fill="#666"/><text x="38" y="8" text-anchor="middle" font-size="5" fill="#fff">G</text>
      <rect x="46" y="0" width="14" height="10" rx="1" fill="#4c4"/><text x="53" y="8" text-anchor="middle" font-size="5" fill="#fff">TX</text>
      <rect x="62" y="0" width="14" height="10" rx="1" fill="#4c4"/><text x="69" y="8" text-anchor="middle" font-size="5" fill="#fff">RX</text>
      <rect x="78" y="0" width="16" height="10" rx="1" fill="#44c"/><text x="86" y="8" text-anchor="middle" font-size="5" fill="#fff">RTS</text>
      <rect x="96" y="0" width="16" height="10" rx="1" fill="#44c"/><text x="104" y="8" text-anchor="middle" font-size="5" fill="#fff">CTS</text>
      <rect x="114" y="0" width="14" height="10" rx="1" fill="#c84"/><text x="121" y="8" text-anchor="middle" font-size="5" fill="#fff">PK</text>
      <rect x="130" y="0" width="14" height="10" rx="1" fill="#c84"/><text x="137" y="8" text-anchor="middle" font-size="5" fill="#fff">RST</text>
      <rect x="146" y="0" width="12" height="10" rx="1" fill="#888"/><text x="152" y="8" text-anchor="middle" font-size="5" fill="#fff">...</text>
    </g>

    <!-- Edge labels -->
    <text x="225" y="-8" text-anchor="middle" font-size="10" fill="#888">TOP EDGE</text>
    <text x="225" y="345" text-anchor="middle" font-size="10" fill="#aaa">BOTTOM EDGE (connector to host main board)</text>

    <!-- Board dimensions -->
    <line x1="0" y1="355" x2="450" y2="355" stroke="#888" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="0" y2="360" stroke="#888" stroke-width="0.5"/>
    <line x1="450" y1="350" x2="450" y2="360" stroke="#888" stroke-width="0.5"/>
    <text x="225" y="372" text-anchor="middle" font-size="10" fill="#888">~50 mm</text>

    <line x1="465" y1="0" x2="465" y2="320" stroke="#888" stroke-width="0.5"/>
    <line x1="460" y1="0" x2="470" y2="0" stroke="#888" stroke-width="0.5"/>
    <line x1="460" y1="320" x2="470" y2="320" stroke="#888" stroke-width="0.5"/>
    <text x="485" y="165" text-anchor="middle" font-size="10" fill="#888" transform="rotate(90, 485, 165)">~35 mm</text>
  </g>

  <!-- Signal flow diagram -->
  <text x="350" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#444">SIGNAL FLOW</text>

  <g transform="translate(40, 515)">
    <!-- Host side -->
    <rect x="0" y="10" width="100" height="80" rx="5" fill="#1a3a1a" stroke="#4c4" stroke-width="1.5"/>
    <text x="50" y="35" text-anchor="middle" font-size="11" fill="#8f8" font-weight="bold">Host MCU</text>
    <text x="50" y="50" text-anchor="middle" font-size="9" fill="#afa">3.3V logic</text>
    <text x="50" y="65" text-anchor="middle" font-size="9" fill="#afa">UART4</text>
    <text x="50" y="80" text-anchor="middle" font-size="9" fill="#8c8">+ GPIO ctrl</text>

    <!-- Arrow -->
    <line x1="100" y1="50" x2="140" y2="50" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="120" y="42" text-anchor="middle" font-size="8" fill="#888">3.3V</text>

    <!-- 20-pin connector -->
    <rect x="140" y="20" width="80" height="60" rx="4" fill="#555" stroke="#fff" stroke-width="1.5"/>
    <text x="180" y="45" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">20-pin</text>
    <text x="180" y="58" text-anchor="middle" font-size="10" fill="#fff">Connector</text>
    <text x="180" y="72" text-anchor="middle" font-size="8" fill="#ccc">DF12 / header</text>

    <!-- Arrow -->
    <line x1="220" y1="50" x2="260" y2="50" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="240" y="42" text-anchor="middle" font-size="8" fill="#888">3.3V</text>

    <!-- BSS138 -->
    <rect x="260" y="20" width="90" height="60" rx="4" fill="#3a2a2a" stroke="#ff8888" stroke-width="1.5"/>
    <text x="305" y="42" text-anchor="middle" font-size="10" fill="#ffcccc" font-weight="bold">4x BSS138</text>
    <text x="305" y="57" text-anchor="middle" font-size="9" fill="#cc8888">Level Shift</text>
    <text x="305" y="72" text-anchor="middle" font-size="8" fill="#aa6666">3.3V ↔ 1.8V</text>

    <!-- Arrow -->
    <line x1="350" y1="50" x2="390" y2="50" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="370" y="42" text-anchor="middle" font-size="8" fill="#888">1.8V</text>

    <!-- EG800Q -->
    <rect x="390" y="10" width="120" height="80" rx="5" fill="#2a2a3a" stroke="#6666cc" stroke-width="1.5"/>
    <text x="450" y="35" text-anchor="middle" font-size="11" fill="#aaaaff" font-weight="bold">EG800Q-EU</text>
    <text x="450" y="52" text-anchor="middle" font-size="9" fill="#8888cc">1.8V logic</text>
    <text x="450" y="67" text-anchor="middle" font-size="9" fill="#8888cc">LTE CAT-1bis</text>
    <text x="450" y="82" text-anchor="middle" font-size="8" fill="#666699">3.8V VBAT</text>

    <!-- Arrow to antenna -->
    <line x1="510" y1="50" x2="550" y2="50" stroke="#ccaa44" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Antenna -->
    <circle cx="575" cy="50" r="22" fill="#444" stroke="#ffcc44" stroke-width="2"/>
    <text x="575" y="46" text-anchor="middle" font-size="9" fill="#ffcc44">u.FL</text>
    <text x="575" y="57" text-anchor="middle" font-size="8" fill="#cc9933">→ SMA</text>

    <!-- Power line -->
    <rect x="140" y="95" width="370" height="20" rx="3" fill="#3a1a1a" stroke="#c44" stroke-width="1"/>
    <text x="325" y="109" text-anchor="middle" font-size="9" fill="#faa">3.8V VBAT power rail (pin 1) — 3A peak from host buck</text>

    <!-- SIM -->
    <rect x="390" y="95" width="120" height="20" rx="2" fill="#3a3a1a" stroke="#cc4" stroke-width="1"/>
    <text x="450" y="109" text-anchor="middle" font-size="8" fill="#ee8">SIM interface (on-card, not exposed to host)</text>
  </g>
</svg>
